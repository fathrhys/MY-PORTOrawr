name: GitHub Activity Bot

on:
  schedule:
    - cron: '17 * * * *' # Menjalankan setiap jam.
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Randomize execution
        id: random
        run: |
          echo "RUN_COMMIT=true" >> $GITHUB_ENV

      - name: Update Activity Log with Random Commits
        if: env.RUN_COMMIT == 'true'
        run: |
          git config --global user.name "fathrhys"
          git config --global user.email "fadhilfathirahesya@gmail.com"
          
          # Array pesan commit yang berbeda-beda
          MESSAGES=(
            "chore: update activity log"
            "docs: sync daily activity"
            "fix: minor typo in log"
            "refactor: restructure activity log format"
            "style: formatting log entries"
            "perf: optimize activity tracking"
          )
          
          # Ambil pesan acak
          RANDOM_MESSAGE=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          # Buat perubahan yang berbeda setiap kali
          echo "Activity log update at: $(date --utc)" >> .github-activity-log.txt
          echo "Random stat: $(( $RANDOM % 1000 ))" >> .github-activity-log.txt
          
          git add .github-activity-log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "$RANDOM_MESSAGE [skip ci]"
          git push origin HEAD:${{ github.ref }}
