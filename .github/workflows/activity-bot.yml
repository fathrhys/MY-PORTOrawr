name: GitHub Activity Bot

on:
  schedule:
    # Run every 2 hours at random minute between 0-59 using the common "0-59" format is not valid in cron but we run every 2 hours "0 */2" 
    # instead we will run every hour randomly using bash sleep delays
    - cron: '17 * * * *' # Menjalankan setiap jam di menit 17
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Randomize execution
        id: random
        run: |
          # 60% chance to SKIP this hour entirely (so we average 8-10 commits a day instead of 24)
          CHANCE=$(( $RANDOM % 100 ))
          if [ $CHANCE -lt 60 ]; then
            echo "Skipping this run to simulate random human behavior."
            echo "RUN_COMMIT=false" >> $GITHUB_ENV
          else
            echo "Running commit this time."
            echo "RUN_COMMIT=true" >> $GITHUB_ENV
            
            # Wait a random amount of minutes (0 to 45 minutes) and seconds before committing
            # to make the exact commit timestamp completely random
            RANDOM_DELAY=$(( $RANDOM % 2700 ))
            echo "Sleeping for $RANDOM_DELAY seconds before committing..."
            sleep $RANDOM_DELAY
          fi

      - name: Update Activity Log with Random Commits
        if: env.RUN_COMMIT == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Array pesan commit yang berbeda-beda
          MESSAGES=(
            "chore: update activity log"
            "docs: sync daily activity"
            "fix: minor typo in log"
            "refactor: restructure activity log format"
            "style: formatting log entries"
            "perf: optimize activity tracking"
          )
          
          # Ambil pesan acak
          RANDOM_MESSAGE=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          # Buat perubahan yang berbeda setiap kali
          echo "Activity log update at: $(date --utc)" >> .github-activity-log.txt
          echo "Random stat: $(( $RANDOM % 1000 ))" >> .github-activity-log.txt
          
          git add .github-activity-log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "$RANDOM_MESSAGE [skip ci]"
          git push origin HEAD:${{ github.ref }}
